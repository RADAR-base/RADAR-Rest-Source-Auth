service:
  # Interval time in minutes for syncing projects and subjects.
  baseUri: http://0.0.0.0:8085/rest-sources/backend/
  advertisedBaseUri: http://example.org/rest-sources/backend/
  enableCors: true

auth:
  # Management Portal URL
  managementPortalUrl: https://radar-test.thehyve.net/managementportal
  # OAuth2 Client id of rest source auth application
  clientId: radar_rest_sources_auth
  # OAuth2 Client Secret of rest source auth client
  clientSecret: <MP_CLIENT_SECRET>

database:
  driver: org.postgresql.Driver
  url: jdbc:postgresql://localhost:5432/managementportal
  user: radar
  password: radar_test
  dialect: org.hibernate.dialect.PostgreSQLDialect

restSourceClients:
  - sourceType: FitBit
    authorizationEndpoint: https://www.fitbit.com/oauth2/authorize
    tokenEndpoint: https://api.fitbit.com/oauth2/token
    clientId: <CLIENT_ID>
    clientSecret: <CLIENT_SECRET>
    scope: activity heartrate sleep profile
  # Garmin OAuth2 PKCE configuration.
  # oauthVersion: OAUTH2 selects the GarminOAuth2AuthorizationService;
  #               OAUTH1 selects the legacy GarminOAuth1AuthorizationService.
  - sourceType: Garmin
    authorizationEndpoint: https://connect.garmin.com/oauth2Confirm
    tokenEndpoint: https://diauth.garmin.com/di-oauth2-service/oauth/token
    deregistrationEndpoint: https://apis.garmin.com/wellness-api/rest/user/registration
    clientId: <GARMIN_CLIENT_ID>
    clientSecret: <GARMIN_CLIENT_SECRET>
    oauthVersion: OAUTH2
  # Google Health API
  - sourceType: GoogleHealth
    authorizationEndpoint: https://accounts.google.com/o/oauth2/v2/auth
    tokenEndpoint: https://oauth2.googleapis.com/token
    clientId: <GOOGLE_CLIENT_ID>
    clientSecret: <GOOGLE_CLIENT_SECRET>
    scope: https://www.googleapis.com/auth/googlehealth.activity_and_fitness.readonly https://www.googleapis.com/auth/googlehealth.health_metrics_and_measurements.readonly https://www.googleapis.com/auth/googlehealth.sleep.readonly https://www.googleapis.com/auth/googlehealth.irn.readonly https://www.googleapis.com/auth/googlehealth.ecg.readonly https://www.googleapis.com/auth/googlehealth.settings.readonly https://www.googleapis.com/auth/googlehealth.location.readonly
    oauthVersion: OAUTH2

googleHealth:
  serviceAccountKeyPath: ""        # path to the Google service-account JSON (or env GOOGLE_HEALTH_SERVICE_ACCOUNT_PATH)
  apiBaseUrl: https://health.googleapis.com/v4
  googleCloudProjectId: ""
  subscriberId: radar-pushendpoint-stage   # MUST match the Push Endpoint subscriberId
  dataTypes:
    - steps
    - heart-rate
    - heart-rate-variability
    - total-calories
    - daily-resting-heart-rate
    - respiratory-rate-sleep-summary
    - daily-sleep-temperature-derivations
    - sleep
    - exercise
